<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Park — Relatório Gerencial</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#14143C;--green:#3CA078;--green-dark:#2D7A5A;--gold:#F0A014;--red:#DC2828;--cream:#FAF7F0;--gray-200:#E0DED1;--gray-400:#9C9A8C;--gray-600:#5C5A50;--gray-800:#2C2C2A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{background:var(--cream);color:var(--gray-800);border-radius:12px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.4);border-top:4px solid var(--gold)}
.logo{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.sun{width:54px;height:auto}
.title{font-family:'Fraunces',serif;font-size:18px;color:var(--navy);font-weight:600;line-height:1.1}
.tag{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.18em;margin-top:4px;font-weight:600}
h1{font-family:'Fraunces',serif;font-size:24px;color:var(--navy);margin-bottom:8px;font-weight:500}
.subtitle{font-size:13px;color:var(--gray-600);margin-bottom:24px}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-600);font-weight:600;margin-bottom:6px}
input{width:100%;font-family:inherit;font-size:15px;padding:11px 14px;border:1px solid var(--gray-200);border-radius:8px;background:white;color:var(--navy);font-weight:500;margin-bottom:16px}
input:focus{outline:2px solid var(--green);border-color:var(--green)}
button{width:100%;background:var(--green);color:white;border:none;padding:13px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
button:hover{background:var(--green-dark)}
button:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed}
.error{margin-top:14px;padding:10px 14px;background:#FBD9D9;color:#8B1A1A;border-left:3px solid var(--red);border-radius:6px;font-size:12px;display:none}
.error.show{display:block}
.footer{margin-top:20px;text-align:center;font-size:11px;color:var(--gray-400);font-style:italic}
</style>
</head>

  <h1>Acesso restrito</h1>
  <p class="subtitle">Digite a senha pra ver o histórico de relatórios.</p>
  <label for="password">Senha</label>
  <input type="password" id="password" autocomplete="current-password" autofocus required>
  <button type="submit" id="btn-submit">Entrar</button>
  <div class="error" id="error"></div>
  <div class="footer">Cada acesso é notificado.</div>
</form>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-submit');
  const errEl = document.getElementById('error');
  const pwd = document.getElementById('password').value;
  errEl.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Erro ao entrar');
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/';
    location.href = next;
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
